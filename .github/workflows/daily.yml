name: Daily SciRate Notification

on:
  schedule:
    # 23:00 UTC ≈ 08:00 JST next calendar day (Japan Standard Time, UTC+9)
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scirate-notifier
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SCIRATE_CATEGORIES: ${{ vars.SCIRATE_CATEGORIES || 'quant-ph' }}
          TOP_N: ${{ vars.TOP_N || '5' }}
          MIN_SCITES: ${{ vars.MIN_SCITES || '1' }}
        run: python -m scirate_notifier
